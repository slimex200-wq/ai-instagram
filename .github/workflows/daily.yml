name: Daily AI Card News (Instagram)

on:
  # schedule:
  #   - cron: '30 22,10 * * *'  # KST 07:30, 19:30 — 설정 완료 후 활성화
  workflow_dispatch:

permissions:
  contents: write
  pages: write

env:
  TZ: Asia/Seoul

jobs:
  generate:
    name: 카드뉴스 생성
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout last30days skill
        uses: actions/checkout@v4
        with:
          repository: mvanhorn/last30days-skill
          path: .last30days-skill

      - name: Setup last30days lib path
        run: |
          mkdir -p ~/.claude/skills/last30days
          ln -s "$GITHUB_WORKSPACE/.last30days-skill/scripts" ~/.claude/skills/last30days/scripts

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install system dependencies
        run: |
          pip install yt-dlp
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate card news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
        run: python cardnews.py --output output/

      - name: Generate gallery page
        run: python -c "from page_generator import generate_gallery; generate_gallery('output', 'docs')"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ docs/
          git diff --staged --quiet || git commit -m "chore: $(date +%Y-%m-%d) 카드뉴스 생성"
          git push

  post:
    name: Instagram 포스팅
    runs-on: ubuntu-latest
    needs: generate

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Pull latest (카드뉴스 커밋 반영)
        run: git pull origin master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Wait for Pages deployment
        run: |
          DATE=$(date +%Y-%m-%d)
          URL="https://slimex200-wq.github.io/ai-instagram/cards/${DATE}/card-01.png"
          echo "Pages 배포 확인: $URL"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Pages 배포 완료"
              break
            fi
            echo "대기 중... ($((i * 10))초) status=$STATUS"
            sleep 10
          done

      - name: Post to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          DATE=$(date +%Y-%m-%d)
          python instagram_poster.py \
            --date "$DATE" \
            --base-url "https://slimex200-wq.github.io/ai-instagram"
